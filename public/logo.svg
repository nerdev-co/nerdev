<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%">
  <!-- Variant 1: Dark bg (#080808) - main version -->
  <g id="variant-1">
    <rect x="0" y="0" width="400" height="100" fill="#080808"/>
    <rect x="44" y="20" width="12" height="48" fill="#ededed"/>
    <rect x="59" y="20" width="26" height="12" fill="#ededed"/>
    <rect x="59" y="35" width="12" height="33" fill="#ededed"/>
    <rect x="68" y="47" width="17" height="21" fill="#ededed"/>
    <rect x="68" y="65" width="17" height="3" fill="#e85d04"/>
    <text x="100" y="56" font-family="monospace" font-weight="700" font-size="28" fill="#ededed" letter-spacing="-0.02em">nerdev</text>
  </g>
  
  <!-- Variant 2: Orange bg (#e85d04) -->
  <g id="variant-2" transform="translate(0,100)">
    <rect x="0" y="0" width="400" height="100" fill="#e85d04"/>
    <rect x="44" y="20" width="12" height="48" fill="#ffffff"/>
    <rect x="59" y="20" width="26" height="12" fill="#ffffff"/>
    <rect x="59" y="35" width="12" height="33" fill="#ffffff"/>
    <rect x="68" y="47" width="17" height="21" fill="#ffffff"/>
    <rect x="68" y="65" width="17" height="3" fill="#080808"/>
    <text x="100" y="56" font-family="monospace" font-weight="700" font-size="28" fill="#ffffff" letter-spacing="-0.02em">nerdev</text>
  </g>
  
  <!-- Variant 3: Icon only (no wordmark), 64x64px -->
  <g id="variant-3" transform="translate(0,200)">
    <rect x="0" y="0" width="64" height="64" fill="#080808"/>
    <rect x="12" y="10" width="8" height="44" fill="#ededed"/>
    <rect x="23" y="10" width="20" height="8" fill="#ededed"/>
    <rect x="23" y="21" width="8" height="33" fill="#ededed"/>
    <rect x="34" y="32" width="14" height="22" fill="#ededed"/>
    <rect x="34" y="51" width="14" height="3" fill="#e85d04"/>
  </g>
  
  <!-- Variant 4: Favicon 32x32px, orange fill, n-mark as negative space -->
  <g id="variant-4" transform="translate(0,300)">
    <rect x="0" y="0" width="32" height="32" fill="#e85d04"/>
    <rect x="6" y="4" width="5" height="24" fill="#080808"/>
    <rect x="14" y="4" width="12" height="5" fill="#080808"/>
    <rect x="14" y="12" width="5" height="16" fill="#080808"/>
    <rect x="22" y="16" width="6" height="12" fill="#080808"/>
  </g>
</svg>